<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>액티브 BC 통합관리 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js" async defer></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');
        body { font-family: 'Pretendard', sans-serif; letter-spacing: -0.025em; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .modal-overlay { background-color: rgba(15, 23, 42, 0.75); backdrop-filter: blur(6px); }
        .rank-gradient-1 { background: linear-gradient(135deg, #FFD700, #F59E0B); }
        .rank-gradient-2 { background: linear-gradient(135deg, #E2E8F0, #94A3B8); }
        .rank-gradient-3 { background: linear-gradient(135deg, #FDBA74, #D97706); }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .star-perfect { color: #ef4444; }
        .star-ac { color: #f59e0b; }
        #loginGate { position: fixed; inset: 0; z-index: 9999; background: linear-gradient(135deg, #4f46e5 0%, #312e81 100%); display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body class="bg-slate-50 p-4 md:p-6 text-slate-900">

    <div id="loginGate">
        <div class="bg-white p-8 rounded-[32px] shadow-2xl w-full max-w-sm text-center">
            <div class="text-4xl mb-4">🎳</div>
            <h2 class="text-2xl font-black text-slate-800 mb-1">액티브 BC</h2>
            <p class="text-sm text-slate-400 font-bold mb-6">통합관리 시스템 접속</p>
            <div class="space-y-4">
                <input type="password" id="pwInput" placeholder="비밀번호 입력" class="w-full bg-slate-50 border-2 border-slate-100 p-4 rounded-2xl text-center font-black text-xl focus:border-indigo-500 outline-none" onkeypress="if(event.keyCode==13) login()">
                <button onclick="login()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black text-lg shadow-lg hover:bg-indigo-700">접속하기</button>
            </div>
            <p id="loginMsg" class="text-red-500 text-xs font-bold mt-4 opacity-0 transition">비밀번호가 올바르지 않습니다.</p>
        </div>
    </div>

    <div id="mainApp" class="max-w-6xl mx-auto space-y-6 pb-24" style="display:none;">
        <header class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 flex flex-col md:flex-row justify-between items-center gap-6">
            <div>
                <h1 class="text-3xl font-black text-slate-900 uppercase">🎳 액티브 BC <span class="text-indigo-600">통합관리</span></h1>
                <div id="cloudStatus" class="text-[11px] font-bold text-slate-400 mt-1 flex items-center gap-1.5">
                    <span id="statusDot" class="w-2 h-2 rounded-full bg-slate-300"></span> <span id="statusText">오프라인 모드</span>
                </div>
            </div>
            <div class="flex flex-wrap justify-center gap-2">
                <button id="authBtn" onclick="handleAuthClick()" class="bg-white border-2 border-indigo-600 text-indigo-600 px-4 py-2 rounded-xl text-xs font-black flex items-center gap-2 hover:bg-indigo-50 transition">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/1/12/Google_Drive_icon_%282020%29.svg" class="w-4 h-4"> 드라이브 동기화
                </button>
                <div class="h-10 w-px bg-slate-200 mx-1 hidden md:block"></div>
                <button onclick="openModal('monthlyModal')" class="bg-indigo-600 text-white px-5 py-2.5 rounded-xl text-sm font-bold shadow-sm">📅 월간 랭킹</button>
                <button onclick="openModal('annualModal')" class="bg-amber-500 text-white px-5 py-2.5 rounded-xl text-sm font-bold shadow-sm">👑 연간 랭킹</button>
                <button onclick="exportData()" class="bg-white px-4 py-2.5 rounded-xl text-sm font-bold border border-slate-200">📦 백업</button>
                <button onclick="clearAllScores()" class="bg-red-50 text-red-600 px-4 py-2.5 rounded-xl text-sm font-bold border border-red-100">🧹 초기화</button>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <section class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 flex flex-col">
                <h2 class="text-xl font-bold mb-5 flex items-center justify-between text-slate-800">👤 회원 관리 <span id="memberCountBadge" class="text-xs bg-indigo-50 text-indigo-600 px-3 py-1 rounded-full font-bold">0명</span></h2>
                <div class="space-y-2 mb-5">
                    <div class="flex gap-2">
                        <input type="text" id="newMemberName" placeholder="회원명" class="flex-1 bg-slate-50 border border-slate-200 p-2.5 rounded-xl text-sm outline-none focus:ring-2 focus:ring-indigo-500 transition">
                        <input type="number" id="newMemberBase" placeholder="평가AVG" class="w-20 bg-slate-50 border border-slate-200 p-2.5 rounded-xl text-sm text-center font-bold">
                    </div>
                    <button onclick="addNewMember()" class="w-full bg-slate-800 text-white py-2.5 rounded-xl font-black text-sm">신규 회원 등록</button>
                </div>
                <p class="text-[10px] text-slate-400 font-bold mb-2 ml-1">* 이름 클릭 시 평가 AVG 수정</p>
                <div id="memberBadgeList" class="flex flex-wrap gap-2 overflow-y-auto pt-4 border-t border-slate-100 max-h-48 custom-scroll"></div>
            </section>

            <section class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 md:col-span-2">
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-3">
                    <h2 class="text-xl font-bold text-slate-800">📝 성적 기록</h2>
                    <div class="flex gap-2 w-full sm:w-auto">
                        <input type="date" id="gameDateInput" class="bg-slate-50 border border-slate-200 px-3 py-2 rounded-xl font-bold text-sm">
                        <label class="bg-emerald-600 text-white px-4 py-2 rounded-xl text-xs font-bold cursor-pointer flex items-center">📗 엑셀 업로드(*) <input type="file" id="excelUpload" class="hidden" accept=".xlsx, .xls" onchange="uploadExcelWithStar(event)"></label>
                    </div>
                </div>
                <div class="space-y-5">
                    <select id="memberSelector" onchange="loadScoreData()" class="w-full bg-indigo-50 border border-indigo-100 p-3.5 rounded-2xl font-black text-xl text-indigo-900 cursor-pointer"></select>
                    <div class="grid grid-cols-4 gap-4">
                        <script>for(let i=1; i<=4; i++) { document.write(`<div><p class="text-sm text-center font-bold text-slate-500 mb-2">${i}G</p><input type="number" id="g${i}" class="w-full text-center font-black text-3xl border-b-4 border-slate-100 focus:border-indigo-500 outline-none py-2" max="300" tabindex="${i}"></div>`); }</script>
                    </div>
                    <div class="grid grid-cols-4 gap-4 bg-slate-50 p-3 rounded-2xl border border-slate-100 text-center">
                        <script>for(let i=1; i<=4; i++) { document.write(`<label class="flex flex-col items-center gap-1.5 cursor-pointer py-1 group"><input type="checkbox" id="ac${i}" class="w-5 h-5 rounded border-slate-300 text-indigo-600" tabindex="${i+4}"><span class="text-[10px] font-bold text-slate-500 group-hover:text-indigo-600 transition font-black uppercase">AC ${i}</span></label>`); }</script>
                    </div>
                    <button onclick="saveAndGoNext()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black text-xl shadow-lg hover:bg-indigo-700 active:scale-[0.98] transition-all" tabindex="9">기록 저장 후 다음 회원 →</button>
                </div>
            </section>
        </div>

        <section class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 overflow-hidden w-full">
            <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
                <h2 class="text-2xl font-black text-slate-900 tracking-tight">📊 공식 월례회 성적표 <span class="text-sm text-slate-400 font-bold ml-2">(당일/월간/평가 AVG 비교)</span></h2>
                <input type="date" id="viewDateSelector" onchange="renderUI()" class="bg-slate-50 border border-slate-200 p-2.5 rounded-xl text-sm font-bold outline-none">
            </div>
            <div class="overflow-x-auto rounded-xl border border-slate-100 max-h-[600px] overflow-y-auto custom-scroll">
                <table class="w-full border-collapse text-center min-w-[1100px]">
                    <thead class="sticky top-0 z-10 bg-slate-50 shadow-sm font-black text-slate-400 text-[11px] uppercase border-b border-slate-100">
                        <tr>
                            <th class="p-4">순번</th><th class="p-4 text-left">회원명</th>
                            <th class="p-4">1G</th><th class="p-4">2G</th><th class="p-4">3G</th><th class="p-4">4G</th>
                            <th class="p-4 bg-indigo-50/50 text-indigo-600">당일AVG</th>
                            <th class="p-4 bg-amber-50/30 text-amber-700">월간AVG</th>
                            <th class="p-4 bg-slate-100 text-slate-800">평가AVG</th>
                            <th class="p-4">차이(Diff)</th>
                            <th class="p-4 text-red-600">벌금여부</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="text-sm font-bold text-slate-700 bg-white"></tbody>
                </table>
            </div>
        </section>
    </div>

    <div id="monthlyModal" class="fixed inset-0 z-[100] hidden items-center justify-center p-4">
        <div class="absolute inset-0 modal-overlay" onclick="closeModal('monthlyModal')"></div>
        <div class="bg-white w-full max-w-4xl rounded-[32px] shadow-2xl z-10 overflow-hidden border border-slate-200">
            <div class="bg-indigo-600 p-6 text-white flex justify-between items-center"><h3 class="text-2xl font-black italic">📅 <span id="modalMonthTitle"></span>월 누적 순위</h3><button onclick="closeModal('monthlyModal')" class="text-4xl">&times;</button></div>
            <div class="p-4 max-h-[75vh] overflow-y-auto custom-scroll"><table class="w-full text-center"><thead class="text-[11px] font-black text-slate-400 uppercase border-b-2"><tr><th class="p-4">순위</th><th class="p-4">변동</th><th class="p-4 text-left">회원명</th><th class="p-4 text-indigo-600 font-bold">월간 총점</th><th class="p-4">참여</th><th class="p-4">게임</th><th class="p-4 text-emerald-600 font-bold">월간 AVG</th></tr></thead><tbody id="monthlyRankBody" class="font-bold"></tbody></table></div>
        </div>
    </div>

    <div id="annualModal" class="fixed inset-0 z-[100] hidden items-center justify-center p-4">
        <div class="absolute inset-0 modal-overlay" onclick="closeModal('annualModal')"></div>
        <div class="bg-white w-full max-w-4xl rounded-[32px] shadow-2xl z-10 overflow-hidden border border-slate-200">
            <div class="bg-amber-500 p-6 text-white flex justify-between items-center"><h3 class="text-2xl font-black tracking-tight text-white">👑 2026 연간 통합 명예의 전당</h3><button onclick="closeModal('annualModal')" class="text-4xl">&times;</button></div>
            <div class="p-4 max-h-[75vh] overflow-y-auto custom-scroll"><table class="w-full text-center"><thead class="text-[11px] text-slate-400 border-b-2"><tr><th class="p-4">순위</th><th class="p-4 text-left">회원명</th><th class="p-4 text-amber-600 font-bold">누적 총점</th><th class="p-4">참여</th><th class="p-4">게임</th><th class="p-4 text-emerald-600 font-bold">전체 AVG</th></tr></thead><tbody id="annualRankBody" class="font-bold"></tbody></table></div>
        </div>
    </div>

    <script>
        /* [1. 보안 및 환경 설정] */
        const APP_PASSWORD = '1124'; 
        const CLIENT_ID = '168841538864-8cbah16psh4sv40d9iv2599ijo9rck7q.apps.googleusercontent.com';
        const SCOPES = 'https://www.googleapis.com/auth/drive.file';
        let members = [], history = {}, accessToken = null, tokenClient;
        const syncFileName = "ActiveBC_Sync_Data_v37.json";

        function login() {
            if (document.getElementById('pwInput').value === APP_PASSWORD) {
                sessionStorage.setItem('abc_login', 'true');
                document.getElementById('loginGate').style.display = 'none';
                document.getElementById('mainApp').style.display = 'block';
                initApp();
            } else {
                document.getElementById('loginMsg').style.opacity = '1';
            }
        }

        /* [2. 코어 데이터 함수] */
        function initApp() {
            let savedMembers = JSON.parse(localStorage.getItem('ABC_M_V37')) || [];
            // 하위 호환성: 이름 문자열 배열을 객체 배열로 전환
            members = savedMembers.map(m => typeof m === 'string' ? { name: m, base: 0 } : m);
            if(members.length === 0) {
                const PHOTO_ORDER = ["권덕화", "김경아", "김병용", "김승진", "김재규", "김재훈", "김지수", "김창우", "박미경", "박미정", "박세혁", "변민애", "선윤미", "안광환", "오범석", "오환준", "이광우", "이대호", "이봉선", "이진수", "임국화", "장남수", "조문기", "조아람", "조왕제", "최동호", "한상광", "황옥인"];
                members = PHOTO_ORDER.map(n => ({ name: n, base: 0 }));
            }
            history = JSON.parse(localStorage.getItem('ABC_H_V37')) || {};
            const now = new Date().toISOString().split('T')[0];
            document.getElementById('gameDateInput').value = now;
            document.getElementById('viewDateSelector').value = now;
            renderUI();
            if (typeof google !== 'undefined') initGIS();
        }

        function renderUI() {
            const vDate = document.getElementById('viewDateSelector').value;
            const targetMonth = vDate.substring(0, 7);
            document.getElementById('memberCountBadge').innerText = `${members.length}명`;

            // 회원 배지 리스트 (클릭 시 평가 AVG 수정)
            document.getElementById('memberBadgeList').innerHTML = members.map(m => `
                <div class="bg-slate-50 px-2 py-1 rounded-lg border border-slate-200 flex items-center shadow-sm text-[11px] font-bold">
                    <span class="cursor-pointer text-slate-700 hover:text-indigo-600" onclick="editBaseAvg('${m.name}')">${m.name}(${m.base})</span>
                    <button onclick="removeMember('${m.name}')" class="ml-2 text-slate-300 hover:text-red-500 font-black">×</button>
                </div>
            `).join('');

            const opts = '<option value="">회원 선택</option>' + members.map(m => `<option value="${m.name}">${m.name}</option>`).join('');
            document.getElementById('memberSelector').innerHTML = opts;

            const dayData = history[vDate] || {}, tbody = document.getElementById('tableBody');
            
            tbody.innerHTML = members.map((member, i) => {
                const record = dayData[member.name] || { s: [0, 0, 0, 0], ac: [0, 0, 0, 0] };
                const validScores = record.s.filter(s => s > 0);
                const dailyAvg = validScores.length > 0 ? (validScores.reduce((a, b) => a + b, 0) / validScores.length).toFixed(1) : 0;
                
                // 월간 AVG 계산
                const monthlyAvg = calcMonthlyAvg(member.name, targetMonth);
                
                // 차이 및 벌금 계산
                const diff = dailyAvg > 0 ? (dailyAvg - member.base).toFixed(1) : "-";
                const isPenalty = dailyAvg > 0 && parseFloat(dailyAvg) < member.base;

                return `
                    <tr class="border-b border-slate-50 font-bold text-base hover:bg-slate-50 transition">
                        <td class="p-4 text-[11px] text-slate-300 font-mono">${i + 1}</td>
                        <td class="p-4 text-left text-slate-900">${member.name}${getStar(record.s, record.ac)}</td>
                        ${record.s.map((s, idx) => `<td class="p-4 ${record.ac[idx] ? 'bg-indigo-50/30' : ''}">${s || '-'}</td>`).join('')}
                        <td class="p-4 bg-indigo-50/50 text-indigo-700 text-lg">${dailyAvg || '-'}</td>
                        <td class="p-4 bg-amber-50/30 text-amber-700">${monthlyAvg || '-'}</td>
                        <td class="p-4 bg-slate-100 text-slate-500 font-mono">${member.base}</td>
                        <td class="p-4 font-mono ${parseFloat(diff) < 0 ? 'text-red-500' : 'text-blue-500'}">${diff > 0 ? '+' + diff : diff}</td>
                        <td class="p-4">${isPenalty ? '<span class="bg-red-50 text-red-600 px-3 py-1 rounded-full text-xs font-black">💸 벌금</span>' : '-'}</td>
                    </tr>`;
            }).join('');
        }

        /* [3. 보조 계산 함수] */
        function calcMonthlyAvg(name, monthStr) {
            let total = 0, count = 0;
            for (let date in history) {
                if (date.startsWith(monthStr) && history[date][name]) {
                    const valid = history[date][name].s.filter(s => s > 0);
                    total += valid.reduce((a, b) => a + b, 0);
                    count += valid.length;
                }
            }
            return count > 0 ? (total / count).toFixed(1) : 0;
        }

        function getStar(s, ac, idx = -1) {
            if (idx === -1) { 
                if (s.includes(300)) return '<span class="star-perfect ml-1">★</span>'; 
                if (ac.includes(true)) return '<span class="star-ac ml-1">⭐</span>'; 
                return ''; 
            }
            if (s[idx] === 300) return '<span class="star-perfect ml-0.5">★</span>'; 
            if (ac[idx]) return '<span class="star-ac ml-0.5">⭐</span>'; 
            return '';
        }

        function editBaseAvg(name) {
            const member = members.find(m => m.name === name);
            const newVal = prompt(`${name} 회원의 평가 AVERAGE를 입력하세요:`, member.base);
            if (newVal !== null) {
                member.base = parseInt(newVal) || 0;
                updateDB();
            }
        }

        function addNewMember() {
            const name = document.getElementById('newMemberName').value.trim();
            const base = parseInt(document.getElementById('newMemberBase').value) || 0;
            if (name && !members.find(m => m.name === name)) {
                members.push({ name, base });
                document.getElementById('newMemberName').value = '';
                document.getElementById('newMemberBase').value = '';
                updateDB();
            }
        }

        function updateDB(sync = true) {
            localStorage.setItem('ABC_M_V37', JSON.stringify(members));
            localStorage.setItem('ABC_H_V37', JSON.stringify(history));
            renderUI();
            if (sync && accessToken) syncToDrive();
        }

        /* [4. 구글 동기화 및 공통 기능] */
        function initGIS() {
            try {
                tokenClient = google.accounts.oauth2.initTokenClient({
                    client_id: CLIENT_ID, scope: SCOPES,
                    callback: (res) => { accessToken = res.access_token; updateCloudStatus(true); syncFromDrive(); },
                });
            } catch (e) { console.error("GIS Fail", e); }
        }
        function handleAuthClick() { if (!accessToken) tokenClient.requestAccessToken({ prompt: 'consent' }); else syncToDrive(); }
        function updateCloudStatus(on) {
            document.getElementById('statusDot').className = on ? "w-2 h-2 rounded-full bg-emerald-500" : "w-2 h-2 rounded-full bg-slate-300";
            document.getElementById('statusText').innerText = on ? "온라인 (드라이브 동기화 중)" : "오프라인 모드";
        }
        async function syncFromDrive() {
            try {
                const res = await fetch(`https://www.googleapis.com/drive/v3/files?q=name='${syncFileName}' and trashed=false`, { headers: { 'Authorization': `Bearer ${accessToken}` } });
                const list = await res.json();
                if (list.files.length > 0) {
                    const dRes = await fetch(`https://www.googleapis.com/drive/v3/files/${list.files[0].id}?alt=media`, { headers: { 'Authorization': `Bearer ${accessToken}` } });
                    const driveData = await dRes.json();
                    if (confirm("드라이브에서 데이터를 불러올까요?")) { members = driveData.members; history = driveData.history; updateDB(false); }
                }
            } catch (err) {}
        }
        async function syncToDrive() {
            if (!accessToken) return;
            const content = JSON.stringify({ members, history });
            try {
                const sRes = await fetch(`https://www.googleapis.com/drive/v3/files?q=name='${syncFileName}' and trashed=false`, { headers: { 'Authorization': `Bearer ${accessToken}` } });
                const list = await sRes.json();
                let url = 'https://www.googleapis.com/upload/drive/v3/files?uploadType=media', method = 'POST';
                if (list.files.length > 0) { url = `https://www.googleapis.com/upload/drive/v3/files/${list.files[0].id}?uploadType=media`; method = 'PATCH'; }
                else {
                    const cRes = await fetch('https://www.googleapis.com/drive/v3/files', { method: 'POST', headers: { 'Authorization': `Bearer ${accessToken}`, 'Content-Type': 'application/json' }, body: JSON.stringify({ name: syncFileName, mimeType: 'application/json' }) });
                    const nF = await cRes.json(); url = `https://www.googleapis.com/upload/drive/v3/files/${nF.id}?uploadType=media`; method = 'PATCH';
                }
                await fetch(url, { method, headers: { 'Authorization': `Bearer ${accessToken}`, 'Content-Type': 'application/json' }, body: content });
            } catch (err) {}
        }

        // 기타 기능 (v36 동일 유지)
        function saveAndGoNext() {
            const date = document.getElementById('gameDateInput').value, name = document.getElementById('memberSelector').value;
            if(!name) return;
            const s = [], ac = []; 
            for(let i=1; i<=4; i++) { s.push(parseInt(document.getElementById(`g${i}`).value) || 0); ac.push(document.getElementById(`ac${i}`).checked); }
            if(!history[date]) history[date] = {}; history[date][name] = { s, ac };
            updateDB();
            const idx = members.findIndex(m => m.name === name);
            if(idx < members.length - 1) { 
                document.getElementById('memberSelector').value = members[idx+1].name; 
                loadScoreData(); document.getElementById('g1').focus(); document.getElementById('g1').select(); 
            }
        }
        function loadScoreData() {
            const d = document.getElementById('gameDateInput').value, n = document.getElementById('memberSelector').value;
            const e = (history[d] && history[d][n]) || { s: ['', '', '', ''], ac: [0, 0, 0, 0] };
            [1, 2, 3, 4].forEach(i => { document.getElementById(`g${i}`).value = e.s[i - 1]; document.getElementById(`ac${i}`).checked = !!e.ac[i - 1]; });
        }
        function openModal(id) { document.getElementById(id).style.display = 'flex'; if(id==='monthlyModal') renderMonthlyRank(); if(id==='annualModal') renderAnnualRank(); }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function removeMember(name) { if(confirm(`${name} 삭제?`)) { members = members.filter(m => m.name !== name); updateDB(); } }
        function clearAllScores() { if(confirm("초기화?")) { history = {}; updateDB(); } }
        function exportData() { const b = new Blob([JSON.stringify({ members, history })], { type: 'application/json' }); const a = document.createElement("a"); a.href = URL.createObjectURL(b); a.download = `ActiveBC_Backup_v37.json`; a.click(); }

        window.addEventListener('load', () => {
            if (sessionStorage.getItem('abc_login') === 'true') {
                document.getElementById('loginGate').style.display = 'none';
                document.getElementById('mainApp').style.display = 'block';
                initApp();
            }
        });
    </script>
</body>
</html>
